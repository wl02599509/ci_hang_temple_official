# StylePrompts 資料庫
# 供 ui-visual-design skill 調度使用

styles:
  - id: s01
    code: S01
    name: 科技極簡
    slug: tech-minimal
    summary: 乾淨俐落的 SaaS 科技風格，強調留白、理性層級與可信任感
    category: saas
    tags: [科技, 極簡, 可信任, 專業, SaaS, B2B]
    use_case: [landing-page, product-site, dashboard]
    industry: [saas, software, b2b]
    visual_hints:
      palette: 中性灰階 + 單一品牌主色
      typography: 幾何無襯線（Inter, SF Pro）
      composition: 大量留白、卡片式分區、清楚層級
      components: 細邊框、輕陰影、小圓角
      mood: 理性、專業、可信任
    prompt:
      short: 設計科技極簡風格的 SaaS 落地頁，使用中性色與單一品牌主色，強調留白、清楚層級、可信任感與高轉換 CTA。
    ai_match:
      triggers: [科技極簡, tech minimal, SaaS 風格, 極簡科技, B2B 專業]
      keywords: [科技, 極簡, 乾淨, 專業, 理性, SaaS, B2B]

